services:
  # The Admin Backend API
  - type: web
    name: admin-api
    env: node
    rootDir: apps/admin-api
    buildCommand: pnpm install && pnpm prisma generate && pnpm build
    startCommand: pnpm start:prod
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: INITIAL_SUPERADMIN_EMAIL
        sync: false
      - key: INITIAL_SUPERADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false # Set this to the deployed dashboard URL once it's up

  # The Admin Dashboard Frontend
  - type: web
    name: admin-dashboard
    env: node
    rootDir: apps/admin-dashboard
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set this to the deployed admin-api URL
